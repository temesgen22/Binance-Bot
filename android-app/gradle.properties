# Project-wide Gradle settings.
# Increase heap for D8 dex merging and large builds (fixes OutOfMemoryError in mergeExtDexDebug)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=false

# Use Java 17 for Gradle (fixes JDK 21 compatibility issues)
# Java 17 path (found from JAVA_HOME environment variable)
